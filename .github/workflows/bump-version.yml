name: Bump version

on:
  push:
    branches: [master]
    paths-ignore:
      - version.json   # prevents infinite loop when the action self-commits

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write new version
        run: printf '{"v":%s}\n' "$(date +%s)" > version.json

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || (git commit -m "chore: bump version" && git push)
